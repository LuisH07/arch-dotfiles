font_size 13
line_height 1.2
letter_spacing 0.0
# bold_font auto
# italic_font auto
confirm_os_window_close 0

window_margin_width 8
single_window_margin_width 0
window_border_width 0.1 pt
window_padding_width 12

background_image_layout scaled
background_tint 0.4
dynamic_background_opacity no
background_opacity 0.85

enabled_layouts Tall, *
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_margin_width 5
tab_activity_symbol *

disable_ligatures yes
enable_audio_bell no
shell_integration disabled

url_style curly
remember_window_size no
cursor_blink_interval 1
cursor_shape block
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
sync_to_monitor no
repaint_delay
input_delay 5
cursor_trail 1

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMonoNL Nerd Font Mono' postscript_name=JetBrainsMonoNLNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
